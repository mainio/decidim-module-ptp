name: "[CI] PTP"
on:
  push:
    branches:
      - main
      - develop
      - release/*
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build_app:
    name: Build test application
    uses: mainio/gha-decidim-module/.github/workflows/build_app.yml@main
    secrets: inherit
  main:
    needs: build_app
    strategy:
      fail-fast: false
      matrix:
        module:
          - decidim-module-budgets_booth
          - decidim-module-l10n
          - decidim-module-sms-twilio
          - decidim-module-smsauth
    name: Tests
    uses: mainio/gha-decidim-module/.github/workflows/ci_rspec.yml@main
    secrets: inherit
